<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student - Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --accent-color: #e74c3c;
            --success-color: #27ae60;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }
        
        .edit-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px 25px;
            margin-top: 30px;
            max-width: 700px;
        }
        
        @media (max-width: 768px) {
            .edit-container {
                padding: 25px 20px;
                margin-top: 20px;
                border-radius: 15px;
            }
            
            .header-section {
                padding: 20px 15px;
                border-radius: 12px;
            }
            
            .header-section h2 {
                font-size: 20px;
            }
            
            .info-box {
                padding: 12px;
                font-size: 13px;
            }
        }
        
        @media (max-width: 576px) {
            .edit-container {
                padding: 20px 15px;
            }
            
            .header-section h2 {
                font-size: 18px;
            }
            
            .form-control {
                padding: 10px 15px;
                font-size: 14px;
            }
            
            .btn-update, .btn-back {
                padding: 12px 25px;
                font-size: 15px;
            }
        }
        
        .header-section {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .form-label {
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 8px;
        }
        
        .form-control {
            border-radius: 10px;
            border: 2px solid #ddd;
            padding: 12px 20px;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 0.2rem rgba(52, 152, 219, 0.25);
        }
        
        .btn-update {
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .btn-update:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }
        
        .btn-back {
            background: linear-gradient(135deg, #95a5a6, #7f8c8d);
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 10px;
        }
        
        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(149, 165, 166, 0.4);
        }
        
        .info-box {
            background: #e3f2fd;
            border-left: 4px solid var(--secondary-color);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="edit-container">
            <!-- Header -->
            <div class="header-section">
                <h2><i class="fas fa-user-edit"></i> Edit Student Information</h2>
            </div>

            <!-- Info Box -->
            <div class="info-box">
                <i class="fas fa-info-circle"></i> Update the student details below and click "Update Student" to save changes.
            </div>

            <!-- Edit Form -->
            <form method="POST" class="row g-3">
                {% csrf_token %}
                
                <div class="col-md-12">
                    <label for="name" class="form-label">
                        <i class="fas fa-user"></i> Student Name
                    </label>
                    <input type="text" name="name" class="form-control" id="name" 
                           value="{{ student.StdName }}" required autofocus>
                </div>
                
                <div class="col-md-6">
                    <label for="email" class="form-label">
                        <i class="fas fa-envelope"></i> Email Address
                    </label>
                    <input type="email" name="email" class="form-control" id="email" 
                           value="{{ student.StdEmail }}" required>
                </div>
                
                <div class="col-md-3">
                    <label for="age" class="form-label">
                        <i class="fas fa-birthday-cake"></i> Age
                    </label>
                    <input type="number" name="age" class="form-control" id="age" 
                           value="{{ student.StdAge }}" required>
                </div>
                
                <div class="col-md-3">
                    <label for="phone" class="form-label">
                        <i class="fas fa-phone"></i> Phone Number
                    </label>
                    <input type="tel" name="phone" class="form-control" id="phone" 
                           value="{{ student.StdPhone|default:'' }}">
                </div>
                
                <div class="col-md-12">
                    <label for="course" class="form-label">
                        <i class="fas fa-book"></i> Course Name
                    </label>
                    <input type="text" name="course" class="form-control" id="course" 
                           value="{{ student.course.CourseName }}" required>
                </div>

                <div class="col-md-12 mt-4">
                    <button type="submit" class="btn btn-update">
                        <i class="fas fa-save"></i> Update Student
                    </button>
                    <a href="/" class="btn btn-back">
                        <i class="fas fa-arrow-left"></i> Back to List
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
